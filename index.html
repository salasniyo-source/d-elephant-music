<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-Elephant Music</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#0f172a;
color:white;
text-align:center;
}

header{
background:#020617;
padding:20px;
border-bottom:1px solid #1e293b;
}

h1{margin:0;color:#38bdf8}

#music-container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:30px;
max-width:1100px;
margin:auto;
}

.album{
background:#020617;
padding:15px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,.4);
}

.album img{
width:100%;
height:200px;
object-fit:cover;
border-radius:8px;
}

audio{
width:100%;
margin-top:10px;
}

.actions{
margin-top:10px;
display:flex;
justify-content:space-between;
}

button{
border:none;
background:#2563eb;
color:white;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

button:hover{opacity:.9}

.comments{
margin-top:10px;
font-size:12px;
text-align:left;
}

.comments input{
width:100%;
margin-top:5px;
padding:6px;
border:none;
border-radius:5px;
}

</style>
</head>

<body>

<header>
<h1>D-Elephant Music Streaming</h1>
</header>

<div id="music-container"></div>

<script>

const musicContainer=document.getElementById('music-container')

const songs=[
{file:'song1.mp3',cover:'cover1.jpg',title:'Song One'},
{file:'song2.mp3',cover:'cover2.jpg',title:'Song Two'},
{file:'song3.mp3',cover:'cover3.jpg',title:'Song Three'}
]

let reactions=new Array(songs.length).fill(0)
let comments=songs.map(()=>[])

function render(){

musicContainer.innerHTML=""

songs.forEach((song,i)=>{

const album=document.createElement('div')
album.className='album'

album.innerHTML=`

<img src="covers/${song.cover}" onerror="this.src='https://picsum.photos/300?random=${i}'">

<h3>${song.title}</h3>

<audio controls src="songs/${song.file}"></audio>

<div class="actions">
<button onclick="react(${i})">🔥 ${reactions[i]}</button>
<a href="songs/${song.file}" download>
<button>⬇ Download</button>
</a>
</div>

<div class="comments">
${comments[i].map(c=>`<div>💬 ${c}</div>`).join("")}
<input placeholder="Write comment" onkeydown="addComment(event,${i})">
</div>

`

musicContainer.appendChild(album)

})

}

function react(i){

reactions[i]++
render()

}

function addComment(e,i){

if(e.key==="Enter" && e.target.value){

comments[i].push(e.target.value)

e.target.value=""

render()

}

}

render()

</script>

</body>
</html>
