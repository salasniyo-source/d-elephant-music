<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Elephant Music Streaming</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .album { margin: 20px; display: inline-block; }
        img { width: 150px; height: 150px; }
    </style>
</head>
<body>
    <h1>Welcome to D-Elephant Music Streaming Platform</h1>
    <div id="music-container"></div>
    <script>
        const musicContainer = document.getElementById('music-container');
        const songs = [
            'song1.mp3',
            'song2.mp3',
            'song3.mp3'
        ];
        const covers = [
            'cover1.jpg',
            'cover2.jpg',
            'cover3.jpg'
        ];

        songs.forEach((song, index) => {
            const albumDiv = document.createElement('div');
            albumDiv.className = 'album';
            const audio = document.createElement('audio');
            audio.controls = true;
            audio.src = `songs/${song}`;
            const cover = document.createElement('img');
            cover.src = `covers/${covers[index]}`;
            albumDiv.appendChild(audio);
            albumDiv.appendChild(cover);
            musicContainer.appendChild(albumDiv);
        });
    </script>
</body>
</html>
